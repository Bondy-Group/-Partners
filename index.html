<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credicorp | HR Transformation Dashboard</title>
    <!-- Tailwind CSS para diseño profesional sin dependencias locales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .kanban-column { min-height: 200px; }
      .progress-bar { transition: width 1s ease-in-out; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">

    <div id="app"></div>

    <script>
      /**
       * DATA CORE - Edita estos valores para actualizar el dashboard
       */
      const PROJECT_DATA = {
        header: {
          name: "Credicorp | HR Transformation & Brazil Hub Benchmark",
          lastUpdate: "07 de Abril, 2026",
          status: "En curso", // En curso, En riesgo, Bloqueado
          statusColor: "bg-blue-500"
        },
        workstreams: [
          { id: 1, name: "Benchmark Hub Brasil (EVP SP)", status: "En curso", progress: 65, milestone: "Finalización de entrevistas locales", owner: "M. Partners", color: "blue" },
          { id: 2, name: "Diagnóstico HR & Procesos", status: "En curso", progress: 40, milestone: "Workshop de pain points", owner: "Consultoría HR", color: "indigo" },
          { id: 3, name: "Movilidad Internacional", status: "Pendiente", progress: 10, milestone: "Definición de política base", owner: "Global Mobility", color: "slate" },
          { id: 4, name: "HR Tech & IA", status: "En curso", progress: 25, milestone: "Demo de herramientas IA", owner: "Tech Lead", color: "cyan" },
          { id: 5, name: "Employee Experience", status: "Completado", progress: 100, milestone: "Encuesta de clima inicial", owner: "EX Specialist", color: "emerald" }
        ],
        kanban: [
          { title: "Definición de muestra Benchmark", stream: "Benchmark Hub Brasil", owner: "Mara", column: "backlog" },
          { title: "Análisis de costos SP vs Lima", stream: "Benchmark Hub Brasil", owner: "Juan", column: "analisis" },
          { title: "Mapeo de procesos 'As-Is'", stream: "Diagnóstico HR", owner: "Sofía", column: "hallazgos" },
          { title: "Ajuste de workflow de aprobación", stream: "Diagnóstico HR", owner: "Sofía", column: "quickwins" },
          { title: "Diseño de Hub Regional", stream: "Proyectos Estratégicos", owner: "Mara", column: "estrategicos" },
          { title: "Validación de presupuesto IA", stream: "HR Tech & IA", owner: "Diego", column: "validacion" }
        ],
        openQuestions: [
          { topic: "EVP Brasil", question: "¿Cuál es el paquete de beneficios mandatorio por sindicato en SP?", status: "Pendiente" },
          { topic: "Movilidad", question: "¿Se contemplará housing para niveles gerenciales?", status: "En análisis" },
          { topic: "HR Tech", question: "¿Existe restricción de uso de datos en la nube para IA?", status: "Crítica" }
        ],
        timeline: [
          { date: "15 Abr", event: "Presentación de Hallazgos Preliminares Benchmark" },
          { date: "22 Abr", event: "Workshop de Co-diseño Procesos HR" },
          { date: "05 May", event: "Entrega de Business Case Brazil Hub" }
        ],
        stakeholders: [
          { name: "Carlos Rodríguez", org: "Credicorp", role: "Sponsor / CHRO", relation: "Aliado" },
          { name: "Lucía Méndez", org: "Credicorp", role: "HR Director Brazil", relation: "Favorable" },
          { name: "Roberto Tech", org: "Credicorp", role: "CTO", relation: "Neutral" }
        ]
      };

      /**
       * RENDER ENGINE
       */
      function renderDashboard() {
        const app = document.getElementById('app');
        
        app.innerHTML = `
          <!-- Header -->
          <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div>
                <h1 class="text-2xl font-bold text-slate-900">${PROJECT_DATA.header.name}</h1>
                <p class="text-sm text-slate-500 mt-1">Última actualización: ${PROJECT_DATA.header.lastUpdate}</p>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-slate-600 uppercase tracking-wider">Estado:</span>
                <span class="px-4 py-1.5 rounded-full text-white text-sm font-bold ${PROJECT_DATA.header.statusColor} shadow-sm">
                  ${PROJECT_DATA.header.status}
                </span>
              </div>
            </div>
          </header>

          <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-10">
            
            <!-- Workstreams Cards -->
            <section>
              <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> Workstreams & Avance
              </h2>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                ${PROJECT_DATA.workstreams.map(ws => `
                  <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                      <span class="text-xs font-bold uppercase text-${ws.color}-600 bg-${ws.color}-50 px-2 py-1 rounded">${ws.status}</span>
                      <span class="text-xs text-slate-400 font-medium">${ws.progress}%</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm mb-3 h-10 overflow-hidden">${ws.name}</h3>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mb-4">
                      <div class="bg-${ws.color}-500 h-1.5 rounded-full progress-bar" style="width: ${ws.progress}%"></div>
                    </div>
                    <div class="space-y-2">
                      <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tight">Próximo Hito</p>
                      <p class="text-xs text-slate-700 font-medium truncate">${ws.milestone}</p>
                      <div class="pt-2 flex items-center gap-2">
                        <div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">
                          ${ws.owner.charAt(0)}
                        </div>
                        <span class="text-[11px] text-slate-500">${ws.owner}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>

            <!-- Kanban Board -->
            <section>
              <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-600 rounded-full"></span> Tablero de Gestión (Backlog/Kanban)
              </h2>
              <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 overflow-x-auto pb-4">
                ${['backlog', 'analisis', 'hallazgos', 'quickwins', 'estrategicos', 'validacion'].map(col => `
                  <div class="min-w-[200px]">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 px-2">${col.replace(/([A-Z])/g, ' $1').trim()}</h3>
                    <div class="space-y-3 kanban-column">
                      ${PROJECT_DATA.kanban.filter(k => k.column === col).map(task => `
                        <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm text-sm hover:border-blue-300 cursor-default">
                          <p class="font-medium text-slate-800 mb-2">${task.title}</p>
                          <div class="flex flex-wrap gap-1 mb-2">
                            <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 font-bold uppercase">${task.stream}</span>
                          </div>
                          <div class="flex justify-between items-center text-[10px] text-slate-400">
                            <span>Resp: ${task.owner}</span>
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <!-- Open Questions -->
              <div class="lg:col-span-2 space-y-6">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                  <span class="w-2 h-6 bg-amber-500 rounded-full"></span> Open Questions (Pendientes Cliente)
                </h2>
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                  <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200">
                      <tr>
                        <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Tema</th>
                        <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Pregunta / Definición</th>
                        <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs text-center">Prioridad</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                      ${PROJECT_DATA.openQuestions.map(q => `
                        <tr class="hover:bg-slate-50 transition-colors">
                          <td class="px-6 py-4 font-bold text-blue-600">${q.topic}</td>
                          <td class="px-6 py-4 text-slate-700">${q.question}</td>
                          <td class="px-6 py-4 text-center">
                            <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${q.status === 'Crítica' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}">
                              ${q.status}
                            </span>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              </div>

              <!-- Timeline / Hitos -->
              <div class="space-y-6">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                  <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> Próximos Hitos
                </h2>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div class="space-y-8 relative before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                    ${PROJECT_DATA.timeline.map(item => `
                      <div class="relative pl-8">
                        <div class="absolute left-0 top-1.5 w-6 h-6 rounded-full bg-white border-4 border-emerald-500 z-10"></div>
                        <p class="text-xs font-bold text-emerald-600 uppercase mb-1">${item.date}</p>
                        <p class="text-sm text-slate-800 font-medium leading-tight">${item.event}</p>
                      </div>
                    `).join('')}
                  </div>
                </div>
              </div>
            </div>

            <!-- Stakeholders -->
            <section>
              <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-slate-800 rounded-full"></span> Mapa de Stakeholders
              </h2>
              <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                  <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Nombre</th>
                      <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Organización</th>
                      <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Rol</th>
                      <th class="px-6 py-3 font-bold text-slate-600 uppercase text-xs">Estado Relación</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100">
                    ${PROJECT_DATA.stakeholders.map(s => `
                      <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-800">${s.name}</td>
                        <td class="px-6 py-4 text-slate-600">${s.org}</td>
                        <td class="px-6 py-4 text-slate-600">${s.role}</td>
                        <td class="px-6 py-4">
                          <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${s.relation === 'Aliado' ? 'bg-emerald-500' : s.relation === 'Favorable' ? 'bg-blue-400' : 'bg-slate-300'}"></span>
                            <span class="text-xs font-medium">${s.relation}</span>
                          </div>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </section>

          </main>

          <footer class="bg-slate-900 text-slate-400 py-10 mt-20">
            <div class="max-w-7xl mx-auto px-4 text-center">
              <p class="text-sm font-medium">Credicorp HR Transformation Dashboard | Confidencial</p>
              <p class="text-xs mt-2 opacity-50">Generado por Asistente Estratégico HR - 2026</p>
            </div>
          </footer>
        `;
      }

      // Inicializar dashboard
      document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
  </body>
</html>
