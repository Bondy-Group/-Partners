<style>
:root {
  --bg:       #0F0D1C;
  --surface:  #1A1730;
  --surface2: #22203A;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.14);
  --text1:    #F0EEF8;
  --text2:    #A09CB8;
  --text3:    #6B6885;
  --verde:    #A3E635;
  --verde-d:  #7CB518;
  --verde-s:  rgba(163,230,53,.12);
  --morado:   #7C74D6;
  --morado-s: rgba(124,116,214,.12);
  --azul:     #4A9EE8;
  --azul-s:   rgba(74,158,232,.12);
  --amber:    #F59E0B;
  --amber-s:  rgba(245,158,11,.12);
  --rojo:     #E24B4A;
  --rojo-s:   rgba(226,75,74,.12);
  --label-w:  110px;
  --row-h:    32px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; background: var(--bg); color: var(--text1); }
body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; }

/* TOPBAR */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 44px;
}
.topbar-logo {
  font-size: 14px; font-weight: 700; color: var(--text1);
  letter-spacing: -.3px;
}
.topbar-logo b { color: var(--verde); }
.topbar-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; background: var(--verde-s);
  color: var(--verde); border-radius: 100px; padding: 2px 8px;
  margin-left: 8px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-link {
  font-size: 11px; color: var(--text2); text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px;
  transition: all .15s;
}
.topbar-link:hover { color: var(--text1); border-color: var(--border); background: var(--surface2); }
.date-badge {
  font-size: 10px; color: var(--text3); font-family: 'Courier New', monospace;
}

/* LAYOUT */
.page { max-width: 1300px; margin: 0 auto; padding: 24px 20px 60px; }

.page-header { margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; color: var(--text1); margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text2); }

/* LEGEND */
.legend {
  display: flex; flex-wrap: wrap; gap: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 24px;
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.leg-bar { width: 20px; height: 8px; border-radius: 2px; }
.leg-diamond { width: 8px; height: 8px; transform: rotate(45deg); flex-shrink: 0; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.leg-dot-out { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid; background: transparent; }

/* GANTT WRAPPER */
.gantt-outer {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}

/* MONTH HEADER */
.month-header {
  display: flex; border-bottom: 1px solid var(--border2);
  position: sticky; top: 44px; z-index: 50; background: var(--surface);
}
.month-label-spacer { width: var(--label-w); flex-shrink: 0; }
.months-track { flex: 1; display: flex; }
.month-cell {
  flex: 1; text-align: center; font-size: 9px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text3);
  padding: 8px 0; border-right: 1px solid var(--border);
}
.month-cell:last-child { border-right: none; }
.month-cell.cur { color: var(--rojo); }

/* SECTION */
.section { border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }
.section-title {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px 6px;
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ROWS */
.gantt-row {
  display: flex; align-items: center;
  min-height: var(--row-h);
  border-bottom: 1px solid var(--border);
}
.gantt-row:last-child { border-bottom: none; }
.row-label {
  width: var(--label-w); flex-shrink: 0;
  font-size: 9px; font-weight: 600; color: var(--text3);
  letter-spacing: .04em; text-transform: uppercase;
  padding: 0 10px; line-height: 1.3;
}
.track {
  flex: 1; position: relative;
  height: var(--row-h);
}

/* GRID LINES */
.grid-line {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: var(--border); pointer-events: none;
}
.today-line {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: var(--rojo);
  opacity: .6; pointer-events: none; z-index: 5;
}

/* GANTT ELEMENTS */
.g-bar {
  position: absolute; border-radius: 3px;
  height: 10px; top: 50%; transform: translateY(-50%);
  cursor: pointer; transition: filter .15s, opacity .15s;
}
.g-bar:hover { filter: brightness(1.2); }

.g-diamond {
  position: absolute; top: 50%; transform: translate(-50%, -50%) rotate(45deg);
  cursor: pointer; z-index: 4;
  transition: transform .15s;
}
.g-diamond:hover { transform: translate(-50%, -50%) rotate(45deg) scale(1.3); }

.g-dot {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  border-radius: 50%; cursor: pointer; z-index: 4;
  transition: transform .15s;
}
.g-dot:hover { transform: translate(-50%, -50%) scale(1.4); }

.g-label {
  position: absolute; font-size: 8px; white-space: nowrap;
  pointer-events: none; z-index: 3;
  top: 50%; transform: translateY(-50%);
}

/* TOOLTIP */
#tooltip {
  position: fixed; z-index: 9999;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  min-width: 220px; max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  pointer-events: none;
  opacity: 0; transition: opacity .12s;
  font-size: 11px;
}
#tooltip.visible { opacity: 1; }
.tt-title { font-size: 12px; font-weight: 700; color: var(--text1); margin-bottom: 6px; line-height: 1.3; }
.tt-date { font-size: 10px; color: var(--text3); margin-bottom: 6px; font-family: 'Courier New', monospace; }
.tt-body { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.tt-links { display: flex; flex-direction: column; gap: 4px; }
.tt-link {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--azul);
  text-decoration: none; pointer-events: all;
  padding: 3px 6px; border-radius: 5px;
  background: var(--azul-s); transition: background .1s;
}
.tt-link:hover { background: rgba(74,158,232,.22); }
.tt-link::before { content: '↗'; font-size: 9px; }
.tt-tag {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 1px 7px; border-radius: 100px; margin-bottom: 5px;
}
.tt-section-sep { height: 1px; background: var(--border); margin: 6px 0; }

/* TODAY LABEL */
.today-label {
  position: absolute; top: 2px; font-size: 8px; font-weight: 700;
  color: var(--rojo); transform: translateX(-50%);
  background: var(--surface); padding: 0 3px; z-index: 6;
  pointer-events: none;
}

/* SCROLL */
.gantt-scroll { overflow-x: auto; }
</style>
</head>

// ── RENDER ──────────────────────────────────────────────
const root = document.getElementById('gantt-root');

function buildMonthHeader() {
  const row = document.createElement('div');
  row.className = 'month-header';
  const spacer = document.createElement('div');
  spacer.style.cssText = `width:var(--label-w);flex-shrink:0;border-right:1px solid rgba(255,255,255,.08)`;
  row.appendChild(spacer);
  const track = document.createElement('div');
  track.style.cssText = 'flex:1;display:flex;position:relative';
  MONTHS.forEach((m, i) => {
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (i === 4 ? ' cur' : '');
    cell.textContent = m;
    track.appendChild(cell);
  });
  row.appendChild(track);
  root.appendChild(row);
}

function buildSection(sec) {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';

  const titleDiv = document.createElement('div');
  titleDiv.className = 'section-title';
  const dot = document.createElement('div');
  dot.className = 'section-dot';
  dot.style.background = sec.color;
  titleDiv.appendChild(dot);
  titleDiv.appendChild(document.createTextNode(sec.label));
  secDiv.appendChild(titleDiv);

  sec.rows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'gantt-row';

    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = row.label;
    rowDiv.appendChild(lbl);

    const track = document.createElement('div');
    track.className = 'track';

    // Grid lines
    MONTHS.forEach((_, i) => {
      if (i > 0) {
        const gl = document.createElement('div');
        gl.className = 'grid-line';
        gl.style.left = ((i / (N-1)) * 100) + '%';
        track.appendChild(gl);
      }
    });

    // Today line
    const todayPct = dateToFrac(TODAY) * 100;
    const tl = document.createElement('div');
    tl.className = 'today-line';
    tl.style.left = todayPct + '%';
    track.appendChild(tl);

    row.items.forEach(item => renderItem(track, item));
    rowDiv.appendChild(track);
    secDiv.appendChild(rowDiv);
  });

  root.appendChild(secDiv);
}

function renderItem(track, item) {
  let el;
  if (item.type === 'bar') {
    el = document.createElement('div');
    el.className = 'g-bar';
    const f = dateToFrac(item.from) * 100;
    const t = dateToFrac(item.to) * 100;
    el.style.cssText = `left:${f}%;width:${t-f}%;background:${item.color};opacity:${item.opacity||1}`;
  } else if (item.type === 'diamond') {
    el = document.createElement('div');
    el.className = 'g-diamond';
    const sz = item.size || 9;
    const pct = dateToFrac(item.date) * 100;
    el.style.cssText = `left:${pct}%;width:${sz}px;height:${sz}px;background:${item.color}`;
  } else if (item.type === 'dot') {
    el = document.createElement('div');
    el.className = 'g-dot';
    const pct = dateToFrac(item.date) * 100;
    el.style.cssText = `left:${pct}%;width:8px;height:8px;background:${item.color}`;
  } else if (item.type === 'dot-out') {
    el = document.createElement('div');
    el.className = 'g-dot';
    const pct = dateToFrac(item.date) * 100;
    el.style.cssText = `left:${pct}%;width:8px;height:8px;background:transparent;border:1.5px solid ${item.color}`;
  }
  if (el && item.tt) {
    el.addEventListener('mouseenter', e => showTooltip(e, item));
    el.addEventListener('mousemove', e => posTooltip(e));
    el.addEventListener('mouseleave', hideTooltip);
  }
  if (el) track.appendChild(el);
}

// ── TOOLTIP ──────────────────────────────────────────────
const tt = document.getElementById('tooltip');
let ttVisible = false;

function showTooltip(e, item) {
  const d = item.tt;
  document.getElementById('tt-tag').textContent = d.tag || '';
  document.getElementById('tt-tag').style.background = (d.tagColor||'#444') + '22';
  document.getElementById('tt-tag').style.color = d.tagColor || '#aaa';
  document.getElementById('tt-title').textContent = d.title;
  document.getElementById('tt-date').textContent = d.date || '';
  document.getElementById('tt-body').textContent = d.body || '';
  const linksDiv = document.getElementById('tt-links');
  linksDiv.innerHTML = '';
  if (d.links && d.links.length) {
    d.links.forEach(lk => {
      const a = document.createElement('a');
      a.className = 'tt-link';
      a.href = lk.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = lk.label;
      linksDiv.appendChild(a);
    });
  }
  tt.classList.add('visible');
  posTooltip(e);
}

function posTooltip(e) {
  const margin = 16;
  const tw = tt.offsetWidth || 260;
  const th = tt.offsetHeight || 160;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if (x + tw > window.innerWidth - 10) x = e.clientX - tw - margin;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - margin;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function hideTooltip() {
  tt.classList.remove('visible');
}

// ── INIT ────────────────────────────────────────────────
document.getElementById('today-str').textContent =
  TODAY.toLocaleDateString('es-AR', {day:'numeric',month:'long',year:'numeric'});

buildMonthHeader();
SECTIONS.forEach(buildSection);
</script>
